<!DOCTYPE html>
<html>
<head>
  <title>Send Email</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Send Email via Render Backend</h2>
  <form id="emailForm">
    <input type="email" id="to" placeholder="Recipient Email" required>
    <input type="text" id="subject" placeholder="Subject" required>
    <textarea id="text" placeholder="Message" rows="6" required></textarea>
    <button type="submit">Send Email</button>
  </form>

  <p id="status"></p>

  <script>
    const form = document.getElementById("emailForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        to: document.getElementById("to").value,
        subject: document.getElementById("subject").value,
        text: document.getElementById("text").value
      };

      try {
        const response = await fetch("https://mail-server-yz9l.onrender.com/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          status.textContent = "✅ Email sent successfully!";
          form.reset();
        } else {
          status.textContent = "❌ Error sending email.";
        }
      } catch (err) {
        status.textContent = "❌ Cannot connect to server.";
      }
    });
  </script>
</body>
</html>
